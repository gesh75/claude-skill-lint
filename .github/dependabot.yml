version: 2
updates:
  # Keep the SHA-pinned GitHub Actions in .github/workflows up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
    groups:
      github-actions:
        patterns:
          - "*"
