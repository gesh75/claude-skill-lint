name: ci
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run tests
        run: python3 test_skill_lint.py
      - name: Self-lint (the repo's own example skills, if any)
        run: python3 skill_lint.py tests/fixtures --quiet || true
